# StickyDo — Hyprland layer rules
# Enables background blur + transparency for the StickyDo panel.
#
# Add these lines to your Hyprland config. If you're using a dotfile
# framework with a dedicated user-config file (e.g. Caelestia's
# ~/.config/caelestia/hypr-user.conf), add them there instead of
# directly editing hyprland.conf.
#
# Then reload: hyprctl reload
#
# Note: Hyprland's layer-rule syntax has changed across versions.
# Confirmed working on Hyprland 0.5x with the match:namespace syntax below.
# On older versions, use the legacy syntax instead:
#   layerrule = blur, ^(stickydo)$
#   layerrule = ignorealpha 0.1, ^(stickydo)$

layerrule = blur true, match:namespace ^(stickydo)$
layerrule = ignore_alpha 0.1, match:namespace ^(stickydo)$
